name: MODO S1 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install -e ".[train,serve,multimodal]" 2>/dev/null || true
      
      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check . --select=E,F,W,I,UP,B,C4 --ignore=E501
      
      - name: Type check (mypy)
        run: |
          pip install mypy
          mypy --ignore-missing-imports train_lora.py server.py prepare_data.py train_dpo.py 2>/dev/null || true
      
      - name: Syntax check
        run: |
          python -m py_compile train_lora.py server.py prepare_data.py train_dpo.py train.py

  build-docker:
    needs: lint-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-api:
    needs: build-docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Pull image
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
      
      - name: Start container
        run: |
          docker run -d --name modo-test \
            -p 8000:8000 \
            -e MODO_MODEL=nvidia/Nemotron-3-Ultra \
            -e MODO_ADAPTER=/app/adapters/modo-s1-final-merged \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          sleep 15
      
      - name: Health check
        run: |
          for i in {1..10}; do
            if curl -sf http://localhost:8000/health; then
              echo "API healthy"
              exit 0
            fi
            sleep 3
          done
          echo "Health check failed"
          docker logs modo-test
          exit 1
      
      - name: Test chat completion
        run: |
          curl -X POST http://localhost:8000/v1/chat/completions \
            -H "Content-Type: application/json" \
            -d '{"model": "modo-s1", "messages": [{"role": "user", "content": "Say hello"}]}' | jq .
      
      - name: Cleanup
        if: always()
        run: docker rm -f modo-test || true